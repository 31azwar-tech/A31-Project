/* ---------- Timeline ---------- */
function renderTimeline(el){
  const td=todayISO(); const days=[]; for(let i=-2;i<12;i++) days.push(addDays(td,i));
  const ts=visibleTasks().filter(t=>t.due);
  let html=`<div class="tlwrap"><div class="tl-scale"><div></div>${days.map(d=>{
    const dt=new Date(d+'T00:00:00');
    return `<div class="tld ${d===td?'today':''}">${DOW[dt.getDay()]}<br>${dt.getDate()}</div>`;}).join('')}</div>`;
  for(const f of leafFolders()){
    const ft=ts.filter(t=>t.folderId===f.id);
    if(!ft.length) continue;
    html+=`<div class="tl-row" data-fid="${f.id}"
      ondragover="event.preventDefault()" ondrop="tlDrop(event,'${f.id}')">
      <div class="tl-fold"><span style="color:${f.color};display:inline-flex">${ic(f.icon,15)}</span> ${esc(f.name)}</div>
      ${days.map(d=>`<div class="tl-cell ${d===td?'today':''}"></div>`).join('')}
      ${ft.map(t=>{
        const idx=days.indexOf(t.due);
        if(idx<0) return '';
        const left=`calc(150px + (100% - 150px) * ${idx} / 14)`;
        const w=`calc((100% - 150px)/14 - 6px)`;
        return `<div class="tl-bar" draggable="true" ondragstart="dragStart(event,'${t.id}')"
          onclick="openModal('${t.id}')"
          style="left:${left};width:${w};background:${f.color};${t.done?'opacity:.5':''}">${esc(t.title)}</div>`;
      }).join('')}
    </div>`;
  }
  html+=`<div class="empty" style="margin-top:10px">Drag a bar to another day column to change its due date</div></div>`;
  el.innerHTML=html;
}
function tlDrop(e,fid){
  if(!dragId) return;
  const row=e.currentTarget; const rect=row.getBoundingClientRect();
  const x=e.clientX-rect.left-150; const w=(rect.width-150)/14;
  let idx=Math.floor(x/w); idx=Math.max(0,Math.min(13,idx));
  const iso=addDays(todayISO(),idx-2);
  const t=S.tasks.find(x2=>x2.id===dragId); dragId=null;
  if(t) mutate(()=>{ t.due=iso; t.folderId=fid; });
}

/* ---------- Eisenhower Matrix ---------- */
function quadrantOf(t){
  if(t.quadrant) return t.quadrant;
  const td=todayISO();
  const urgent=t.due && t.due<=addDays(td,2);
  const important=t.priority==='high'||t.priority==='medium';
  return urgent?(important?'q1':'q3'):(important?'q2':'q4');
}
const QUADS=[ ['q1','🔥 Urgent & Important','Do it now'], ['q2','🎯 Important, Not Urgent','Schedule'],
  ['q3','⚡ Urgent, Not Important','Delegate / quick'], ['q4','🌫️ Neither','Eliminate'] ];
function renderEisenhower(el){
  const ts=visibleTasks().filter(t=>!t.done);
  el.innerHTML=`<div class="eiwrap">${QUADS.map(([q,name,hint])=>{
    const qt=ts.filter(t=>quadrantOf(t)===q);
    return `<div class="quad ${q}" ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')" ondrop="eiDrop(event,'${q}')">
      <h4>${name} <span class="qc">${qt.length}</span>
        <span style="margin-left:auto;font-size:10px;color:var(--ink3);font-weight:500">${hint}</span></h4>
      ${qt.map(cardHTML).join('')||'<div class="empty">Drag tasks here</div>'}
    </div>`;}).join('')}</div>`;
}
function eiDrop(e,q){
  e.currentTarget.classList.remove('dragover');
  if(!dragId) return;
  const t=S.tasks.find(x=>x.id===dragId); dragId=null;
  if(t) mutate(()=>t.quadrant=q);
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'baru saja';
  if(s<3600) return Math.floor(s/60)+' mnt lalu';
  if(s<86400) return Math.floor(s/3600)+' jam lalu';
  const d=new Date(ts);
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function snoozeTask(id, mins){
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  let until;
  if(mins==='tomorrow'){ const d=new Date(); d.setDate(d.getDate()+1); d.setHours(8,0,0,0); until=d.getTime(); }
  else { until=Date.now()+ (+mins)*60000; }
  closeSnooze();
  mutate(()=>{ t.snoozeUntil=until; logAct('snooze', t, {detail:mins==='tomorrow'?'besok 08:00':('+' +mins+' mnt')}); });

  toast('Pengingat ditunda');

function agEls(){

function friendlyAuthError(err){
  const c=(err&&(err.code||''))||'';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found'))
    return 'Email atau password salah';
  if(c.includes('email-already-in-use')) return 'Email ini sudah terdaftar — silakan Sign in';
  if(c.includes('invalid-email'))        return 'Format email tidak valid';
  if(c.includes('weak-password'))        return 'Password terlalu lemah (minimal 6 karakter)';
  if(c.includes('network'))              return 'Masalah jaringan — periksa koneksi Anda';
  if(c.includes('too-many-requests'))    return 'Terlalu banyak percobaan. Coba lagi nanti';
  if(c.includes('operation-not-allowed'))return 'Metode Email/Password belum diaktifkan di Firebase Console';
  return (err&&err.message)||'Terjadi kesalahan';
}
async function doAuth(){
  const e=agEls();
  if(!window.__FB || !window.__FB.configured){ agStatus('Firebase belum terkonfigurasi.', true); return; }
  const email=(e.email.value||'').trim(), pw=e.pw.value||'';
  if(!email){ agStatus('Masukkan email Anda', true); e.email.focus(); return; }
  if(!pw){ agStatus('Masukkan password', true); e.pw.focus(); return; }
  if(AG_MODE==='signup'){
    if(pw.length<6){ agStatus('Password minimal 6 karakter', true); return; }
    if(pw!==(e.pw2.value||'')){ agStatus('Password tidak sama', true); return; }
  }
  e.btn.disabled=true; agStatus('Mohon tunggu…');
  try{
    if(AG_MODE==='signup') await window.__FB.signUp(email, pw);
    else                   await window.__FB.signIn(email, pw);
    // onAuthStateChanged akan mengambil alih dari sini.
  }catch(err){
    agStatus(friendlyAuthError(err), true);
    e.btn.disabled=false;
  }
}
async function doForgot(){
  const e=agEls();
  const email=(e.email.value||'').trim();
  if(!email){ agStatus('Isi email dulu, lalu tekan "Lupa password?"', true); e.email.focus(); return; }
  try{
    await window.__FB.resetPassword(email);
    agStatus('Email reset password sudah dikirim ke '+email);
  }catch(err){ agStatus(friendlyAuthError(err), true); }
}

function wireGate(){
  const e=agEls(); if(!e.btn) return;
  e.btn.onclick    = doAuth;
  e.toggle.onclick = ()=>{ AG_MODE = (AG_MODE==='signup'?'login':'signup'); renderGate(); };
  e.forgot.onclick = doForgot;
  e.email.onkeydown = ev=>{ if(ev.key==='Enter') e.pw.focus(); };
  e.pw.onkeydown    = ev=>{ if(ev.key==='Enter'){ if(AG_MODE==='signup') e.pw2.focus(); else doAuth(); } };
  e.pw2.onkeydown   = ev=>{ if(ev.key==='Enter') doAuth(); };
  renderGate();
}

/* --------- Notifikasi deadline (khusus perangkat yang mendukung) --------- */
const NOTIFIED_KEY='a31-notified-v1';

function getNotified(){

}
function setNotified(map){ try{ localStorage.setItem(NOTIFIED_KEY, JSON.stringify(map)); }catch(e){} }

/* Minta izin notifikasi sekali (dipicu oleh interaksi pertama pengguna) */
async function ensureNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied')  return false;
  try{ const p=await Notification.requestPermission(); return p==='granted'; }
  catch(e){ return false; }
}

['click','touchend'].forEach(ev=>{

});

/* Tampilkan notifikasi (lewat SW kalau ada, agar muncul di Android
   meski tab tidak fokus). */
async function fireNotification(title, body, tag, taskId){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const opts={ body, tag, renotify:true, icon:APP_LOGO, badge:APP_LOGO,
               data:{url: location.pathname, taskId: taskId||null},
               actions:[ {action:'snooze', title:'Tunda 10 mnt'},
                         {action:'done',   title:'Selesai'} ] };
  try{
    if(navigator.serviceWorker){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg){ reg.showNotification(title, opts); return; }
    }
  }catch(e){}
  // Fallback: notifikasi langsung (tanpa action buttons); klik → fokus + buka task.
  try{
    const n=new Notification(title, opts);
    n.onclick=()=>{ window.focus(); if(taskId){ try{ openModal(taskId); }catch(e){} } n.close(); };
  }catch(e){}
}

/* Terima pesan dari service worker saat user menekan action di notifikasi
   (snooze / done) atau mengklik badan notifikasi. */
if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('message', ev=>{
    const d=ev.data||{};
    if(d.type==='notif-action' && d.taskId){
      const t=S.tasks.find(x=>x.id===d.taskId);
      if(!t) return;
      if(d.action==='snooze'){ snoozeTask(t.id, 10); }
      else if(d.action==='done'){ if(!t.done) toggleDone(t.id); }
      else { try{ openModal(t.id); }catch(e){} }
    }
  });
}

/* Waktu due sebuah task sebagai epoch ms (pakai jam bila ada, kalau tidak 09:00). */
function taskDueEpoch(t){
  if(!t.due) return null;
  const hm=(t.time&&/^\d\d:\d\d$/.test(t.time))? t.time : '09:00';
  return new Date(t.due+'T'+hm+':00').getTime();
}

/* Cek tugas: kirim notifikasi dengan mempertimbangkan lead-time & snooze.
   - lead-time: notif muncul `t.lead` menit sebelum waktu due.
   - snooze: kalau di-snooze, jangan notif sampai snoozeUntil lewat.
   - maksimal sekali per tugas per hari (kecuali setelah snooze). */
function checkDeadlines(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const td=todayISO();
  const now=Date.now();
  const notified=getNotified();
  // buang catatan hari lampau supaya map tidak membengkak
  for(const k of Object.keys(notified)){ if(notified[k]!==td) delete notified[k]; }

  for(const t of S.tasks){
    if(t.done || !t.due) continue;
    const key=t.id;

    // Hormati snooze: belum waktunya → lewati.
    if(t.snoozeUntil && now < t.snoozeUntil) continue;
    const snoozeElapsed = t.snoozeUntil && now >= t.snoozeUntil;

    // Sudah dinotif hari ini & tidak sedang keluar dari snooze → lewati.
    if(notified[key]===td && !snoozeElapsed) continue;

    const dueMs=taskDueEpoch(t);
    const lead=(+t.lead||0)*60000;
    let fire=false, title='', body='';

    if(t.due<td){
      fire=true; title='⏰ Task terlewat';
      body=`"${t.title}" sudah lewat jatuh tempo (${fmtDate(t.due)}).`;
    } else if(dueMs!=null){
      // Muncul begitu (waktu due − lead) tercapai, hingga waktu due.
      const remindAt = dueMs - lead;
      if(now >= remindAt){
        const late = now >= dueMs;
        title = late ? '📌 Jatuh tempo sekarang' : '🔔 Segera jatuh tempo';
        const when = t.time ? (' jam '+t.time) : '';
        body = late
          ? `"${t.title}" jatuh tempo${when}.`
          : `"${t.title}" jatuh tempo${when} (${t.lead>=1440?'besok':(t.lead>=60?Math.round(t.lead/60)+' jam lagi':t.lead+' menit lagi')}).`;
        fire=true;
      }
    }

    if(fire){
      fireNotification(title, body, 'a31-'+key, t.id);
      notified[key]=td;
      if(snoozeElapsed){ t.snoozeUntil=null; }   // reset snooze setelah dipicu
    }
  }
  setNotified(notified);
  refreshAppBadge();
}

/* Jalankan pengecekan sekarang + berkala tiap menit. */
function scheduleDeadlineChecks(){
  if(__notifTimer) return;                 // sudah terjadwal
  checkDeadlines();
  __notifTimer=setInterval(checkDeadlines, 60*1000);
}
// Cek ulang saat app kembali ke depan (buka dari background di Android)

/* ---------- PWA: register service worker + install prompt ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // Paksa cek update tiap load supaya build lama tidak "nyangkut" di Android.
      try{ reg.update(); }catch(e){}
      // Bila ada SW baru menunggu, aktifkan & muat ulang sekali agar build terbaru dipakai.
      reg.addEventListener('updatefound', ()=>{
        const nw=reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', ()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            try{ nw.postMessage&&nw.postMessage({type:'skip-waiting'}); }catch(e){}
          }
        });
      });
    }).catch(()=>{});
    // Saat controller berganti (SW baru aktif), reload sekali.
    let __reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange', ()=>{
      if(__reloaded) return; __reloaded=true; location.reload();
    });
  });
  // Cek update lagi tiap kali app kembali ke foreground (umum di HP).
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible'){
      navigator.serviceWorker.getRegistration().then(r=>{ if(r) try{ r.update(); }catch(e){} }).catch(()=>{});
    }
  });
}

document.getElementById('install-btn').addEventListener('click', async ()=>{
  const b=document.getElementById('install-btn');
  if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; b.classList.remove('show'); }
});
window.addEventListener('appinstalled', ()=>{ const b=document.getElementById('install-btn'); if(b) b.classList.remove('show'); });

// Handle app-shortcut deep links (?smart=today, ?add=1)
(function(){ const q=new URLSearchParams(location.search);
  if(q.get('smart')) S.ui.smart=q.get('smart');
})();
</script>
